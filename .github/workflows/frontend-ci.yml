name: Angular Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Versão LTS atual recomendada para Angular
        
    - name: Instalar Dependências (NPM)
      run: npm install
      working-directory: ./frontend

    - name: Compilar Projeto (Build)
      run: npm run build
      working-directory: ./frontend
