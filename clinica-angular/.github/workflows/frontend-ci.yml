name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  check-node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5 # Updated from v4 to v5

      - name: Setup Node.js
        uses: actions/setup-node@v5 # Updated from v4 to v5
        with:
          node-version: "24" # Updated from 18 to 24 to clear the warning

      - name: Show Node version
        run: node -v

      - name: Simple Node check
        run: node -e "console.log('Node OK')"
