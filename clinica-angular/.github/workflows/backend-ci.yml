name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-php:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Show PHP version
      run: php -v

    - name: Simple PHP check
      run: php -r 'echo "PHP OK\n";'

    - name: Check PDO MySQL extension
      run: |
        php -r 'if (extension_loaded("pdo_mysql")) { echo "pdo_mysql ok\n"; } else { echo "pdo_mysql missing\n"; exit(1); }'